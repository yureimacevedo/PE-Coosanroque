<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COOSANROQUE - Sistema POA</title>
<style>
body{margin:0;padding:0;font-family:sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh}
.auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.auth-box{background:white;border-radius:16px;padding:2rem;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.auth-header{text-align:center;margin-bottom:2rem}
.auth-header h1{font-size:1.75rem;color:#4F46E5;margin-bottom:0.5rem}
.form-group{margin-bottom:1.5rem}
.form-group label{display:block;margin-bottom:0.5rem;font-weight:600;color:#374151}
.form-group input{width:100%;padding:0.75rem;border:2px solid #E5E7EB;border-radius:8px;font-size:1rem;box-sizing:border-box}
.btn-primary{width:100%;padding:0.875rem;border:none;background:linear-gradient(135deg,#4F46E5 0%,#7C3AED 100%);color:white;border-radius:8px;font-weight:600;cursor:pointer;font-size:1rem}
.error{background:#FEE2E2;color:#991B1B;padding:0.75rem;border-radius:8px;margin-bottom:1rem;font-size:0.875rem}
.loading{color:white;text-align:center;font-size:1.5rem}
</style>
</head>
<body>
<div id="root"><div class="loading">⏳ Cargando...</div></div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const {useState} = React;

const firebaseConfig = {
  apiKey: "AIzaSyBXlB7Yzwxxx72yP6Ua3pOZ7CGVVE_-SRE",
  authDomain: "planestrategica-56e98.firebaseapp.com",
  projectId: "planestrategica-56e98",
  storageBucket: "planestrategica-56e98.firebasestorage.app",
  messagingSenderId: "658675632134",
  appId: "1:658675632134:web:cae4c84ad98f4baa9a3f15"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

const App = () => {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');

  React.useEffect(() => {
    const unsubscribe = auth.onAuthStateChanged(u => {
      setUser(u);
      setLoading(false);
    });
    return unsubscribe;
  }, []);

  const handleLogin = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      await auth.signInWithEmailAndPassword(email, password);
    } catch (err) {
      setError('Error: ' + err.message);
      setLoading(false);
    }
  };

  const handleLogout = () => {
    auth.signOut();
  };

  if (loading) {
    return <div className="loading">⏳ Cargando sistema...</div>;
  }

  if (!user) {
    return (
      <div className="auth-container">
        <div className="auth-box">
          <div className="auth-header">
            <h1>🏢 COOSANROQUE</h1>
            <p style={{color:'#6B7280',fontSize:'0.875rem'}}>Sistema de Gestión POA</p>
          </div>
          {error && <div className="error">{error}</div>}
          <form onSubmit={handleLogin}>
            <div className="form-group">
              <label>Email</label>
              <input 
                type="email" 
                value={email}
                onChange={e => setEmail(e.target.value)}
                required
                placeholder="usuario@example.com"
              />
            </div>
            <div className="form-group">
              <label>Contraseña</label>
              <input 
                type="password"
                value={password}
                onChange={e => setPassword(e.target.value)}
                required
                placeholder="••••••••"
              />
            </div>
            <button type="submit" className="btn-primary">
              🔐 Iniciar Sesión
            </button>
          </form>
        </div>
      </div>
    );
  }

  return (
    <div style={{padding:'2rem',color:'white',textAlign:'center'}}>
      <h1>✅ LOGIN EXITOSO</h1>
      <p>Usuario: {user.email}</p>
      <p style={{background:'rgba(255,255,255,0.2)',padding:'1rem',borderRadius:'8px',marginTop:'2rem'}}>
        Si ves esto, significa que:<br/>
        ✅ React funciona<br/>
        ✅ Firebase funciona<br/>
        ✅ El login funciona<br/>
        <br/>
        El archivo completo debería funcionar igual.
      </p>
      <button onClick={handleLogout} style={{marginTop:'1rem',padding:'0.75rem 2rem',background:'white',color:'#4F46E5',border:'none',borderRadius:'8px',cursor:'pointer',fontWeight:600}}>
        Cerrar Sesión
      </button>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<footer style="background:#1F2937;color:white;padding:1rem;text-align:center;position:fixed;bottom:0;width:100%">
  <p style="margin:0;font-size:0.75rem">© 2026 Yureima Acevedo Arango</p>
</footer>

</body>
</html>
